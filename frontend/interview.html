<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta
      name="viewport"
      content="width=device-width, initial-scale=1.0"
    >

    <title>AI Interview Preparation</title>

    <link rel="stylesheet" href="style.css">

</head>

<body>

    <div class="container">


        <!-- LEFT PANEL -->

        <div class="left-panel">

            <h1>AI Interview Preparation</h1>


            <label>Select Course:</label>

            <br><br>

            <select id="courseSelect">

                <option value="AI/ML">
                    AI/ML
                </option>

                <option value="Web Development">
                    Web Development
                </option>

                <option value="Data Science">
                    Data Science
                </option>

                <option value="Cyber Security">
                    Cyber Security
                </option>

            </select>


            <br><br>


            <button id="startBtn">
                Start Interview
            </button>

            <button id="nextBtn">
                Next Question
            </button>


            <!-- QUESTION BOX -->

            <div class="question-box">

                <h2>Interview Question</h2>

                <p id="questionText">
                    Click Start Interview
                </p>

            </div>


            <!-- ANSWER BOX -->

            <textarea
              id="answerBox"
              placeholder="Type your answer here..."
            ></textarea>


            <br>

            <button id="micBtn">
               🎤 Start Speaking
            </button>


            <button id="submitBtn">
                Submit Answer
            </button>


            <div class="question-box">

                <h2>Your Submitted Answer:</h2>

                <p id="submittedAnswer"></p>

            </div>

        </div>



        <!-- RIGHT PANEL -->

        <div class="right-panel">

            <h1>Emotion Detection</h1>


            <!-- WEBCAM -->

            <video
              id="webcam"
              autoplay
              muted
              playsinline
            ></video>


            <!-- FEEDBACK -->

            <div class="feedback-box">

                <h2>Feedback</h2>

                <p id="confidence"></p>

                <p id="eyeContact"></p>

                <p id="posture"></p>

                <p id="nervousness"></p>

            </div>

        </div>


    </div>

    <script async src="https://cdn.jsdelivr.net/npm/face-api.js@0.22.2/dist/face-api.min.js"></script>

    <script src="script.js"></script>

</body>

</html>
